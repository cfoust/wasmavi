<!--
	frame page of wasavi for google chrome/opera/firefox extension.

	This frame embeds the vim.wasm WebAssembly port of vim instead of the
	original JavaScript reimplementation of vi.  The original engine files
	(wasavi.js, classes*.js, ...) are kept in the repository for reference,
	but they are no longer loaded here.

	@author akahuku@gmail.com (original)

<html>
	<head>
		<meta charset="UTF-8">
		<title>wasavi - vi editor for any web page (vim.wasm)</title>
		<style id="wasavi_global_styles">
			html, body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #1d1f21;
			}
			#wasavi_container {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				background: #1d1f21;
			}
			#wasavi_screen {
				display: block;
				width: 100%;
				height: 100%;
			}
			/*
			 * The input element captures keyboard events for vim.wasm.
			 * It must stay focusable, so it is made invisible rather than
			 * display:none.
			 */
			#wasavi_input {
				position: absolute;
				top: 0;
				left: 0;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: 0;
				border: none;
				outline: none;
				opacity: 0;
				color: transparent;
				background: transparent;
			}
			#wasavi_message {
				position: absolute;
				inset: 0;
				display: none;
				box-sizing: border-box;
				padding: 16px 20px;
				overflow: auto;
				color: #c5c8c6;
				background: #1d1f21;
				font: 13px/1.5 monospace;
				white-space: pre-wrap;
			}
			#wasavi_message.visible { display: block; }
			#wasavi_message h1 { font-size: 15px; margin: 0 0 8px; color: #f0c674; }
			#wasavi_message code { color: #8abeb7; }
		</style>
		<!-- classic script: exposes window.WasaviExtensionWrapper -->
		<script src="frontend/extension_wrapper.js"></script>
		<!-- module script: vim.wasm glue (deferred, runs after the classic one) -->
		<script type="module" src="frontend/vimwasm_frame.js"></script>
	</head>
	<body>
		<div id="wasavi_container">
			<canvas id="wasavi_screen"></canvas>
			<input id="wasavi_input" autocomplete="off" autocorrect="off"
				autocapitalize="off" spellcheck="false">
			<div id="wasavi_message"></div>
		</div>
	</body>
</html>
