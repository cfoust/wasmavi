name: Build wasmavi
description: >-
  Fetch submodules over HTTPS, set up Bun + the pinned emscripten toolchain,
  and build the vim.wasm engine and the bundled extension. Leaves the loadable
  unpacked extension in src/chrome.

runs:
  using: composite
  steps:
    # build:wasm activates (installing if needed) the pinned emscripten version
    # from this emsdk checkout. See scripts/build-vim-wasm.sh.
    - name: Set EMSDK path
      shell: bash
      run: echo "EMSDK=$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_ENV"

    # The committed .gitmodules uses git@github.com: SSH URLs; CI has no SSH
    # key, so rewrite to HTTPS (both submodules are public) and fetch them.
    - name: Check out submodules over HTTPS
      shell: bash
      run: |
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        git submodule sync --recursive
        git submodule update --init --recursive

    - uses: oven-sh/setup-bun@v2

    - name: Cache emsdk
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: emsdk
        key: emsdk-3.1.8-${{ runner.os }}

    - name: Clone emsdk
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      shell: bash
      run: git clone https://github.com/emscripten-core/emsdk.git emsdk

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Build vim.wasm engine
      shell: bash
      run: bun run build:wasm

    - name: Bundle extension
      shell: bash
      run: bun run build
